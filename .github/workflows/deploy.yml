name: Deploy to Server

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/,data/roles.json,src/content/articles/,package.json,package-lock.json,ecosystem.config.cjs"
          target: /home/azureuser/euclid-insights
          overwrite: true

      - name: Install deps and restart app
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            export PATH=/usr/bin:/usr/local/bin:$PATH
            cd /home/azureuser/euclid-insights
            npm install --omit=dev --ignore-scripts
            pm2 delete euclid-insights 2>/dev/null || true
            pm2 start ecosystem.config.cjs
            pm2 save
