<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="blend"/>
    </filter>
  </defs>
  <g>
    <!-- Background -->
    <rect width="800" height="450" fill="#D5E8F5"/>
    <!-- Person 1 (left) -->
    <circle cx="240" cy="160" r="50" fill="#4A90C4"/>
    <rect x="190" y="220" width="100" height="120" rx="20" fill="#4A90C4"/>
    <!-- Person 2 (center, larger) -->
    <circle cx="400" cy="130" r="60" fill="#2B6FA0"/>
    <rect x="340" y="200" width="120" height="140" rx="24" fill="#2B6FA0"/>
    <!-- Person 3 (right) -->
    <circle cx="560" cy="160" r="50" fill="#4A90C4"/>
    <rect x="510" y="220" width="100" height="120" rx="20" fill="#4A90C4"/>
    <!-- AI circuit overlay on center person -->
    <circle cx="400" cy="260" r="30" fill="#1B5A87"/>
    <circle cx="400" cy="260" r="15" fill="#D5E8F5"/>
    <!-- Neural network connections -->
    <line x1="290" y1="240" x2="340" y2="240" stroke="#7BB8D9" stroke-width="3"/>
    <line x1="460" y1="240" x2="510" y2="240" stroke="#7BB8D9" stroke-width="3"/>
    <line x1="290" y1="280" x2="340" y2="270" stroke="#7BB8D9" stroke-width="2" opacity="0.6"/>
    <line x1="460" y1="270" x2="510" y2="280" stroke="#7BB8D9" stroke-width="2" opacity="0.6"/>
    <!-- Floating skill nodes -->
    <circle cx="150" cy="100" r="25" fill="#7BB8D9" opacity="0.6"/>
    <circle cx="650" cy="100" r="25" fill="#7BB8D9" opacity="0.6"/>
    <circle cx="100" cy="350" r="20" fill="#4A90C4" opacity="0.4"/>
    <circle cx="700" cy="350" r="20" fill="#4A90C4" opacity="0.4"/>
    <!-- Connection lines to nodes -->
    <line x1="175" y1="100" x2="240" y2="160" stroke="#7BB8D9" stroke-width="2" opacity="0.4"/>
    <line x1="625" y1="100" x2="560" y2="160" stroke="#7BB8D9" stroke-width="2" opacity="0.4"/>
    <!-- Growth arrow -->
    <rect x="340" y="370" width="120" height="16" rx="8" fill="#2B6FA0" opacity="0.5"/>
    <polygon points="460,350 460,400 500,378" fill="#2B6FA0" opacity="0.5"/>
    <!-- Bottom bar -->
    <rect x="180" y="400" width="440" height="30" rx="15" fill="#4A90C4" opacity="0.3"/>
    <!-- Decorative circles -->
    <circle cx="80" cy="200" r="40" fill="#7BB8D9" opacity="0.3"/>
    <circle cx="720" cy="220" r="35" fill="#7BB8D9" opacity="0.3"/>
    <!-- Grain overlay -->
    <rect width="800" height="450" filter="url(#grain)" opacity="0.15"/>
  </g>
</svg>