<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="blend"/>
    </filter>
  </defs>
  <g>
    <!-- Background -->
    <rect width="800" height="450" fill="#D4F5E0"/>
    <!-- Large cloud shape -->
    <ellipse cx="400" cy="200" rx="220" ry="120" fill="#5AD882"/>
    <circle cx="280" cy="200" r="100" fill="#5AD882"/>
    <circle cx="520" cy="200" r="100" fill="#5AD882"/>
    <circle cx="350" cy="140" r="80" fill="#3DC96A"/>
    <circle cx="450" cy="140" r="80" fill="#3DC96A"/>
    <!-- Cloud inner -->
    <ellipse cx="400" cy="210" rx="140" ry="70" fill="#3DC96A"/>
    <!-- Upload arrow -->
    <rect x="380" y="250" width="40" height="100" rx="8" fill="#1EA84E"/>
    <polygon points="340,260 460,260 400,190" fill="#1EA84E"/>
    <!-- Server rack bottom -->
    <rect x="250" y="360" width="300" height="70" rx="12" fill="#2BB85A"/>
    <rect x="270" y="375" width="60" height="10" rx="4" fill="#D4F5E0"/>
    <rect x="270" y="395" width="60" height="10" rx="4" fill="#D4F5E0"/>
    <circle cx="490" cy="385" r="8" fill="#D4F5E0"/>
    <circle cx="490" cy="405" r="8" fill="#D4F5E0"/>
    <!-- Connection dots -->
    <circle cx="300" cy="330" r="6" fill="#1EA84E"/>
    <circle cx="500" cy="330" r="6" fill="#1EA84E"/>
    <line x1="300" y1="330" x2="300" y2="360" stroke="#1EA84E" stroke-width="3"/>
    <line x1="500" y1="330" x2="500" y2="360" stroke="#1EA84E" stroke-width="3"/>
    <!-- Decorative circles -->
    <circle cx="100" cy="100" r="60" fill="#5AD882" opacity="0.4"/>
    <circle cx="700" cy="380" r="50" fill="#5AD882" opacity="0.4"/>
    <circle cx="680" cy="80" r="40" fill="#3DC96A" opacity="0.3"/>
    <!-- Small floating elements -->
    <rect x="120" y="300" width="60" height="40" rx="10" fill="#3DC96A" opacity="0.5"/>
    <rect x="640" y="200" width="50" height="50" rx="12" fill="#2BB85A" opacity="0.4"/>
    <!-- Grain overlay -->
    <rect width="800" height="450" filter="url(#grain)" opacity="0.15"/>
  </g>
</svg>